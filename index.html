<!DOCTYPE html>
<html>

<head>
<title>Speakiverse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

</head>

<body>

<div class="app">

<h1>🌍 Speakiverse</h1>
<p>Your AI Travel Companion</p>

<button onclick="getLocation()">📍 Detect My Location</button>

<button onclick="showNearby()">🍽 Nearby Places</button>

<button onclick="safeRoute()">🛣 Safe Route</button>

<button class="sos" onclick="sendSOS()">🚨 SOS Emergency</button>

<div class="translator">

<input
type="text"
id="textInput"
placeholder="Type to translate"
/>

<button onclick="translateText()">🌐 Translate</button>

</div>

<p id="result"></p>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="script.js"></script>

</body>

</html>
